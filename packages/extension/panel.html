<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NExt — Server DevTools</title>
  <style>
    /* ══════════════════════════════════════════════
       BASE STYLES — themes loaded via src/themes/*.css
       ══════════════════════════════════════════════ */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--text-tertiary);
      background: transparent;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ── Background ── */
    .gradient-background {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; z-index: -1;
      background: var(--bg-page);
    }
    .grid-overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; z-index: 0;
      background-size: var(--bg-grid-size) var(--bg-grid-size);
      background-image:
        linear-gradient(to right, var(--bg-grid-color) 1px, transparent 1px),
        linear-gradient(to bottom, var(--bg-grid-color) 1px, transparent 1px);
    }
    .noise-overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; z-index: 1;
      opacity: var(--bg-noise-opacity);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border-primary);
      flex-shrink: 0; flex-wrap: nowrap;
      backdrop-filter: blur(12px);
    }
    .toolbar button {
      background: transparent;
      border: 1px solid var(--border-secondary);
      color: var(--text-secondary);
      padding: 3px 10px;
      border-radius: var(--radius-md);
      cursor: pointer; font-size: 11px; font-family: inherit;
      transition: all 0.15s ease;
    }
    .toolbar button:hover {
      background: var(--border-primary);
      border-color: var(--border-hover);
    }
    .clear-btn {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px;
      border-radius: var(--radius-md) !important;
      border: 1px solid var(--border-secondary) !important;
      background: transparent !important;
      color: var(--text-muted) !important;
      font-size: 14px !important; padding: 0 !important;
      transition: all 0.15s ease !important;
    }
    .clear-btn:hover {
      background: var(--clear-hover-bg) !important;
      border-color: var(--clear-hover-border) !important;
      color: var(--color-danger) !important;
    }
    .toolbar input {
      background: var(--bg-primary);
      border: 1px solid var(--border-secondary);
      color: var(--text-secondary);
      padding: 5px 10px;
      border-radius: var(--radius-md);
      font-size: 11.5px; font-family: inherit;
      flex: 1; max-width: 320px; outline: none;
      transition: all 0.2s ease;
    }
    .toolbar input:focus {
      border-color: var(--accent);
      box-shadow: var(--shadow-focus);
      background: var(--input-focus-bg);
    }
    .toolbar input::placeholder { color: var(--text-placeholder); }

    /* ── Footer ── */
    .footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 12px;
      background: var(--bg-toolbar);
      border-top: 1px solid var(--border-primary);
      flex-shrink: 0;
      backdrop-filter: blur(12px);
    }
    .footer .request-count {
      font-size: 10px; color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .footer .status {
      font-size: 10px; font-weight: 500; letter-spacing: 0.3px;
      display: flex; align-items: center; gap: 5px;
    }
    .footer .status .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      display: inline-block;
    }
    .footer .status.connected .status-dot {
      background: var(--color-success);
      box-shadow: 0 0 6px var(--color-success);
    }
    .footer .status.disconnected .status-dot {
      background: var(--color-danger);
      box-shadow: 0 0 6px var(--color-danger);
      animation: pulse 2s ease-in-out infinite;
    }
    .footer .status.connected { color: var(--color-success); }
    .footer .status.disconnected { color: var(--color-danger); }

    /* ── Method filters ── */
    .method-filters {
      display: flex; gap: 2px;
      background: var(--bg-primary);
      border: 1px solid var(--border-secondary);
      border-radius: var(--radius-md);
      padding: 2px;
    }
    .method-filters button {
      background: none; border: none;
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer; font-size: 10px; font-weight: 600;
      font-family: inherit; letter-spacing: 0.5px;
      transition: all 0.15s ease;
    }
    .method-filters button:hover {
      color: var(--text-secondary);
      background: var(--border-primary);
    }
    .method-filters button.active {
      color: var(--text-primary);
      background: var(--filter-active-bg);
    }
    .method-filters button[data-method="GET"].active {
      color: var(--method-get); background: var(--method-get-bg);
    }
    .method-filters button[data-method="POST"].active {
      color: var(--method-post); background: var(--method-post-bg);
    }
    .method-filters button[data-method="PUT"].active {
      color: var(--method-put); background: var(--method-put-bg);
    }
    .method-filters button[data-method="DELETE"].active {
      color: var(--method-delete); background: var(--method-delete-bg);
    }
    .method-filters button[data-method="ACTION"].active {
      color: var(--accent-secondary-light); background: var(--method-action-bg);
    }

    /* ── Content layout ── */
    .content { display: flex; flex: 1; overflow: hidden; }
    .request-list { flex: 1; overflow: auto; background: transparent; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; }
    thead {
      position: sticky; top: 0;
      background: var(--bg-surface-gradient);
      z-index: 1;
      box-shadow: var(--shadow-thead);
    }
    th {
      text-align: left; padding: 7px 10px;
      border-bottom: 1px solid var(--border-primary);
      color: var(--text-muted); font-weight: 600; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap; user-select: none;
    }
    td {
      padding: 6px 10px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; max-width: 400px;
      font-family: var(--font-mono); font-size: 11px;
      border-bottom: 1px solid var(--border-row);
    }
    tr.row { cursor: pointer; transition: background 0.1s ease; }
    tr.row:hover {
      background: var(--row-hover);
      backdrop-filter: blur(2px);
    }
    tr.row.selected {
      background: var(--row-selected);
      box-shadow: inset 4px 0 0 var(--row-selected-accent), var(--row-selected-glow);
      backdrop-filter: blur(5px);
    }
    tr.row:nth-child(even) { background: var(--row-even); }
    tr.row:nth-child(even):hover { background: var(--row-hover); }
    tr.row:nth-child(even).selected { background: var(--row-selected); }

    /* ── Status colors ── */
    .status-2xx { color: var(--color-success); }
    .status-3xx { color: var(--color-warning); }
    .status-4xx { color: var(--color-orange); }
    .status-5xx { color: var(--color-danger); }
    .status-err { color: var(--color-danger); font-style: italic; }

    /* ── Method colors ── */
    .method-get { color: var(--method-get); font-weight: 600; }
    .method-post { color: var(--method-post); font-weight: 600; }
    .method-put { color: var(--method-put); font-weight: 600; }
    .method-delete { color: var(--method-delete); font-weight: 600; }
    .method-patch { color: var(--method-patch); font-weight: 600; }

    /* ── Badges ── */
    .source-badge {
      font-size: 9px; font-weight: 600;
      padding: 2px 6px; border-radius: var(--radius-sm);
      margin-left: 6px; letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .source-badge.action {
      background: var(--badge-action-bg); color: var(--badge-action-color);
      border: 1px solid var(--badge-action-border);
      box-shadow: 0 0 8px var(--badge-action-glow);
    }
    .source-badge.middleware {
      background: var(--badge-mw-bg); color: var(--badge-mw-color);
      border: 1px solid var(--badge-mw-border);
      box-shadow: 0 0 8px var(--badge-mw-glow);
    }
    .source-badge.fetch {
      background: var(--badge-fetch-bg); color: var(--badge-fetch-color);
      border: 1px solid var(--badge-fetch-border);
      box-shadow: 0 0 8px var(--badge-fetch-glow);
    }

    /* ── Resize handle ── */
    .resize-handle {
      width: 3px; cursor: col-resize; background: transparent;
      flex-shrink: 0; display: none;
      transition: background 0.15s ease;
    }
    .resize-handle:hover, .resize-handle.active { background: var(--accent); }
    .resize-handle.visible { display: block; }

    /* ── Detail panel ── */
    .detail-panel {
      width: 450px;
      border-left: 1px solid var(--border-primary);
      background: var(--bg-detail);
      overflow: auto; display: none; flex-shrink: 0;
      backdrop-filter: blur(12px);
    }
    .detail-panel.open { display: block; animation: slideIn 0.15s ease; }

    .detail-tabs {
      display: flex;
      background: var(--bg-surface-gradient);
      border-bottom: 1px solid var(--border-primary);
      position: sticky; top: 0; z-index: 1;
    }
    .detail-tabs button {
      background: none; border: none;
      color: var(--text-muted);
      padding: 8px 14px; cursor: pointer;
      font-size: 11px; font-weight: 700; font-family: inherit;
      border-bottom: 2px solid transparent;
      transition: all 0.15s ease;
    }
    .detail-tabs button:hover { color: var(--text-secondary); }
    .detail-tabs button.active {
      color: var(--text-primary);
      border-bottom: 2px solid var(--accent);
    }
    .detail-tabs .close-btn {
      margin-left: auto; border-bottom: none;
      color: var(--text-muted); font-size: 14px; padding: 8px 12px;
    }
    .detail-tabs .close-btn:hover { color: var(--color-danger); }

    /* ── JSON tree ── */
    .json-tree { font-size: 11px; line-height: 1.6; }
    .json-tree .jt-row { cursor: default; white-space: nowrap; }
    .json-tree .jt-toggle {
      cursor: pointer; user-select: none;
      display: inline-block; width: 12px; font-size: 8px;
      color: var(--text-muted); text-align: center;
    }
    .json-tree .jt-children { display: none; padding-left: 16px; }
    .json-tree .jt-row.open > .jt-children { display: block; }
    .json-tree .jt-row.open > .jt-toggle { transform: rotate(90deg); }
    .json-tree .jt-key { color: var(--json-key); }
    .json-tree .jt-string { color: var(--json-string); }
    .json-tree .jt-number { color: var(--json-number); }
    .json-tree .jt-boolean { color: var(--json-boolean); }
    .json-tree .jt-null { color: var(--json-null); }
    .json-tree .jt-bracket { color: var(--json-bracket); }
    .json-tree .jt-ellipsis { color: var(--json-bracket); }

    /* ── Detail content ── */
    .detail-content { padding: 12px; }
    .detail-section { margin-bottom: 18px; }
    .detail-section h3 {
      color: var(--text-muted); font-size: 10px; font-weight: 600;
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.8px;
    }
    .detail-section:first-child { animation: fadeIn 0.15s ease; }
    .section-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 6px;
    }
    .section-header h3 { margin-bottom: 0; }
    .copy-btn {
      background: transparent;
      border: 1px solid var(--border-secondary);
      color: var(--text-secondary);
      padding: 2px 10px; border-radius: var(--radius-md);
      cursor: pointer; font-size: 10px; font-family: inherit;
      transition: all 0.15s ease;
    }
    .copy-btn:hover {
      background: var(--border-primary);
      border-color: var(--border-hover);
    }
    .header-row {
      display: flex; padding: 4px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .header-name {
      color: var(--json-key); min-width: 160px;
      flex-shrink: 0; font-weight: 500;
    }
    .header-value { color: var(--text-secondary); word-break: break-all; }

    mark.search-hit {
      background: var(--color-warning);
      color: #000;
      border-radius: 2px;
      padding: 0 1px;
    }
    .tab-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 16px; height: 16px; padding: 0 4px;
      border-radius: 8px;
      background: var(--color-warning); color: #000;
      font-size: 9px; font-weight: 700;
      margin-left: 4px; vertical-align: middle;
      line-height: 1;
    }

    /* ── Body preview ── */
    .body-preview {
      background: var(--bg-secondary);
      padding: 10px 12px; border-radius: var(--radius-md);
      border: 1px solid var(--border-primary);
      white-space: pre-wrap; word-break: break-all; overflow: auto;
      color: var(--text-secondary);
      font-family: var(--font-mono); font-size: 11px;
    }
    .body-preview .renderjson { font-family: inherit; font-size: 11px; }
    .body-preview .renderjson a { color: var(--text-muted); text-decoration: none; cursor: pointer; }
    .body-preview .renderjson a:hover { text-decoration: underline; color: var(--accent); }
    .body-preview .renderjson .disclosure { color: var(--text-muted); font-size: 10px; }
    .body-preview .renderjson .string { color: var(--json-string); }
    .body-preview .renderjson .number { color: var(--json-number); }
    .body-preview .renderjson .boolean { color: var(--json-boolean); }
    .body-preview .renderjson .key { color: var(--json-key); }
    .body-preview .renderjson .keyword { color: var(--json-boolean); }
    .body-preview .renderjson .syntax { color: var(--json-bracket); }

    /* ── Empty state ── */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; color: var(--text-muted); font-size: 13px;
      gap: 12px; animation: fadeIn 0.4s ease; padding: 40px 20px;
    }
    .empty-state .empty-icon { font-size: 32px; opacity: 0.6; line-height: 1; }
    .empty-state .empty-text { font-size: 13px; color: var(--text-muted); }
    .empty-state .empty-hint {
      font-size: 11px; color: var(--text-placeholder);
      max-width: 280px; text-align: center; line-height: 1.5;
    }

    /* ── Timing bar ── */
    .timing-bar {
      height: 10px; background: var(--gradient-timing);
      border-radius: 5px; min-width: 3px;
      box-shadow: var(--shadow-timing);
    }

    /* ── JWT ── */
    .jwt-decoded {
      margin: 6px 0; padding: 10px 12px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-primary);
      border-left: 3px solid var(--color-success);
    }
    .jwt-decoded .header-name { color: var(--color-success); font-size: 11px; }
    .jwt-payload {
      margin: 6px 0 0; font-size: 11px; font-family: var(--font-mono);
      color: var(--text-secondary); white-space: pre-wrap; word-break: break-all;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: var(--radius-sm); }
    ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }
    ::-webkit-scrollbar-corner { background: transparent; }

    /* ── Theme switcher ── */
    .theme-switcher {
      display: flex; gap: 3px; margin-left: auto;
    }
    .theme-switcher button {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--border-secondary);
      cursor: pointer; padding: 0; transition: all 0.15s ease;
    }
    .theme-switcher button:hover { border-color: var(--border-hover); transform: scale(1.15); }
    .theme-switcher button.active { border-color: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .theme-switcher button[data-theme="midnight"] { background: #0c0c1b; }
    .theme-switcher button[data-theme="github-dark"] { background: #0d1117; }
    .theme-switcher button[data-theme="catppuccin"] { background: #1e1e2e; }
    .theme-switcher button[data-theme="nord"] { background: #2e3440; }
    .theme-switcher button[data-theme="light"] { background: #ffffff; }
  </style>
</head>
<body data-theme="midnight">
  <div class="gradient-background">
    <div class="grid-overlay"></div>
    <div class="noise-overlay"></div>
  </div>
  <div class="toolbar">
    <button id="clearBtn" class="clear-btn" title="Clear all requests">🚫</button>
    <div class="method-filters" id="methodFilters">
      <button class="active" data-method="all">ALL</button>
      <button data-method="GET">GET</button>
      <button data-method="POST">POST</button>
      <button data-method="PUT">PUT</button>
      <button data-method="DELETE">DEL</button>
      <button data-method="ACTION">ACTION</button>
    </div>
    <input id="filterInput" type="text" placeholder="Search URL, request & response...">
    <div class="theme-switcher" id="themeSwitcher">
      <button data-theme="midnight" class="active" title="Midnight"></button>
      <button data-theme="github-dark" title="GitHub Dark"></button>
      <button data-theme="catppuccin" title="Catppuccin"></button>
      <button data-theme="nord" title="Nord"></button>
      <button data-theme="light" title="Light"></button>
    </div>
  </div>

  <div class="content">
    <div class="request-list" id="requestList">
      <table>
        <thead>
          <tr>
            <th style="width:60px">Method</th>
            <th>URL</th>
            <th style="width:50px">Status</th>
            <th style="width:70px">Duration</th>
            <th style="width:60px">Size</th>
            <th style="width:70px">Time</th>
          </tr>
        </thead>
        <tbody id="requestBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState">
        <span class="empty-icon">☕</span>
        <span class="empty-text">Waiting for requests...</span>
        <span class="empty-hint">Start your Next.js dev server and interact with your app to see server-side requests here.</span>
      </div>
    </div>

    <div class="resize-handle" id="resizeHandle"></div>
    <div class="detail-panel" id="detailPanel">
      <div class="detail-tabs" id="detailTabs">
        <button class="active" data-tab="headers">Headers</button>
        <button data-tab="request">Request</button>
        <button data-tab="response">Response</button>
        <button data-tab="auth" id="authTab" style="display:none">Auth</button>
        <button data-tab="action" id="actionTab" style="display:none">Action</button>
        <button data-tab="timing">Timing</button>
        <button class="close-btn" id="detailCloseBtn" title="Close">✕</button>
      </div>
      <div class="detail-content" id="detailContent"></div>
    </div>
  </div>

  <div class="footer">
    <span id="requestCount" class="request-count"></span>
    <span id="statusIndicator" class="status disconnected"><span class="status-dot"></span> connecting...</span>
  </div>

  <script type="module" src="src/panel.ts"></script>
</body>
</html>
